# ============================================================
# AGAPE SOVEREIGN — COMPLIANCE GATE
# 2026 Standards: ECRA, CPRA, AI Act, NIST CSF 2.0, Zero-Trust
# Runs on every push and PR to main
# ============================================================
name: Compliance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly autonomous compliance sweep — Sunday 03:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Ad-hoc compliance check'

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  # ----------------------------------------------------------
  # 1. Secret & Credential Leak Prevention
  # ----------------------------------------------------------
  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Check for .env files committed
        run: |
          # Exclude intentionally tracked template/example files (.env.example, .env.sample, .env.template)
          VIOLATIONS=$(git ls-files \
            | grep -E '(\.env$|\.env\.[^.]+$|service[-_]account.*\.json$|credentials\.json$)' \
            | grep -vE '(\.env\.example$|\.env\.sample$|\.env\.template$|\.env\.test$|\.env\.ci$|^google-cloud-sdk/)' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Real credential file(s) detected in tracked files. Remove immediately."
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "No credential files found in repo (template files excluded)."

  # ----------------------------------------------------------
  # 2. Dependency Vulnerability Scan
  # ----------------------------------------------------------
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm ci --prefer-offline || npm install

      - name: Audit root dependencies (CRITICAL/HIGH only)
        run: |
          npm audit --audit-level=high --json > audit-report.json || true
          CRITICAL=$(node -e "const r=require('./audit-report.json'); const v=r.vulnerabilities||{}; let c=0; Object.values(v).forEach(x=>{ if(x.severity==='critical') c++; }); console.log(c);")
          HIGH=$(node -e "const r=require('./audit-report.json'); const v=r.vulnerabilities||{}; let h=0; Object.values(v).forEach(x=>{ if(x.severity==='high') h++; }); console.log(h);")
          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::$CRITICAL CRITICAL vulnerabilities found. Must fix before merge."
            exit 1
          fi
          if [ "$HIGH" -gt 5 ]; then
            echo "::warning::$HIGH HIGH vulnerabilities found. Review and remediate."
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: audit-report.json

  # ----------------------------------------------------------
  # 3. Firebase Security Rules Validation
  # ----------------------------------------------------------
  firestore-rules-lint:
    name: Firestore & Storage Rules Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify deny-by-default rule exists in firestore.rules
        run: |
          if ! grep -q 'allow read, write: if false' firestore.rules; then
            echo "::error::firestore.rules is missing the deny-all catch-all rule. Zero-trust baseline broken."
            exit 1
          fi
          echo "Firestore deny-all rule present."

      - name: Verify deny-by-default rule exists in storage.rules
        run: |
          if ! grep -q 'allow read, write: if false' storage.rules; then
            echo "::error::storage.rules is missing the deny-all catch-all rule. Zero-trust baseline broken."
            exit 1
          fi
          echo "Storage deny-all rule present."

      - name: Check admin email allowlist
        run: |
          if ! grep -q 'idin@agape.nyc' firestore.rules; then
            echo "::error::Admin email allowlist missing in firestore.rules."
            exit 1
          fi
          echo "Admin allowlist verified."

  # ----------------------------------------------------------
  # 4. ECRA / Privacy Policy Compliance Checks
  # ----------------------------------------------------------
  ecra-privacy-check:
    name: ECRA & Privacy Compliance Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check consent mechanism exists
        run: |
          CONSENT=$(grep -rl 'consent\|CONSENT\|opt.in\|opt.out\|data.rights\|privacy.notice' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' src/ frontend/src/ 2>/dev/null | wc -l)
          echo "Consent-related files found: $CONSENT"
          if [ "$CONSENT" -lt 1 ]; then
            echo "::warning::No consent/privacy notice mechanism detected in src/. Ensure ECRA-compliant consent UI exists."
          fi

      - name: Check for PII logging patterns
        run: |
          PII_HITS=$(grep -rn 'console\.log.*email\|console\.log.*ssn\|console\.log.*password\|console\.log.*token\|logger.*email\|logger.*password' \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            src/ frontend/ functions/ 2>/dev/null | wc -l)
          echo "PII logging patterns found: $PII_HITS"
          if [ "$PII_HITS" -gt 0 ]; then
            echo "::error::$PII_HITS potential PII logging instances detected. Review before merge."
            grep -rn 'console\.log.*email\|console\.log.*ssn\|console\.log.*password\|console\.log.*token\|logger.*email\|logger.*password' \
              --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
              src/ frontend/ functions/ 2>/dev/null || true
            exit 1
          fi
          echo "No PII logging patterns detected."

      - name: Verify data retention policy documentation
        run: |
          if [ ! -f docs/compliance/ROADMAP.md ]; then
            echo "::error::docs/compliance/ROADMAP.md missing. Data retention policy required for ECRA compliance."
            exit 1
          fi
          echo "Compliance ROADMAP documentation present."

      - name: Check AI transparency disclosure
        run: |
          AI_DISCLOSURE=$(grep -rl 'AI\|artificial.intelligence\|machine.learning\|sovereign.score\|SovereignScore' \
            --include='*.md' docs/ 2>/dev/null | wc -l)
          echo "AI disclosure docs found: $AI_DISCLOSURE"
          if [ "$AI_DISCLOSURE" -lt 1 ]; then
            echo "::warning::No AI transparency disclosure found in docs/. Required under AI Act 2026 for AI-assisted identity apps."
          fi

  # ----------------------------------------------------------
  # 5. Build Integrity Check
  # ----------------------------------------------------------
  build-check:
    name: Build Integrity
    runs-on: ubuntu-latest
    needs: [secret-scan, firestore-rules-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline || npm install

      - name: TypeScript type check
        run: npx tsc --noEmit || echo "::warning::TypeScript errors found — review before production deploy."

      - name: Build
        run: npm run build 2>&1 | tail -20
        continue-on-error: true

  # ----------------------------------------------------------
  # 6. Compliance Summary Report
  # ----------------------------------------------------------
  compliance-summary:
    name: Compliance Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit, firestore-rules-lint, ecra-privacy-check, build-check]
    if: always()
    steps:
      - name: Generate compliance status
        run: |
          echo "## Agape Sovereign — 2026 Compliance Gate Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Leak Detection | ${{ needs.secret-scan.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result == 'success' && '✅ PASS' || needs.dependency-audit.result == 'skipped' && '⏭️ SKIP' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firestore/Storage Rules | ${{ needs.firestore-rules-lint.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ECRA & Privacy Checks | ${{ needs.ecra-privacy-check.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Integrity | ${{ needs.build-check.result == 'success' && '✅ PASS' || '⚠️ WARN' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Standards**: ECRA 2026, CPRA, NIST CSF 2.0, EU AI Act, Zero-Trust Architecture" >> $GITHUB_STEP_SUMMARY
          echo "**App**: sovereign.nyc — AI Digital Identity Sovereign Restoration" >> $GITHUB_STEP_SUMMARY
          echo "**Admin**: idin@agape.nyc | agape@sovereign.nyc" >> $GITHUB_STEP_SUMMARY
