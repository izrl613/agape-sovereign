name: Deploy Architect AI MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'mcp_server/**'
      - 'architect_agent.py'
  workflow_dispatch:

env:
  PROJECT_ID: agape-sovereign
  REGION: us-central1
  SERVICE_NAME: architect-ai-mcp
  IMAGE: gcr.io/agape-sovereign/architect-ai-mcp

jobs:
  deploy-mcp-server:
    name: Build & Deploy MCP Server (Offline LLM — No Vertex AI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build MCP Server image
        run: |
          echo "Building Architect AI MCP Server..."
          echo "AI Backend: LOCAL OFFLINE LLM (Ollama+gemma2:2b)"
          echo "Vertex AI: DISABLED"
          docker build \
            -f mcp_server/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push image to GCR
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --memory 4Gi \
            --cpu 2 \
            --timeout 300 \
            --concurrency 10 \
            --min-instances 0 \
            --max-instances 3 \
            --no-allow-unauthenticated \
            --set-env-vars "OLLAMA_MODEL=gemma2:2b,MCP_PORT=8080" \
            --labels "app=architect-ai,backend=offline-llm,vertex-ai=disabled" \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "MCP Server URL: $URL"
          echo "MCP_SERVER_URL=$URL" >> $GITHUB_ENV

          # Health check (requires auth token in production)
          TOKEN=$(gcloud auth print-identity-token)
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/health" || echo "000")
          echo "Health check HTTP status: $STATUS"

      - name: Post deployment summary
        run: |
          echo "### Architect AI MCP Server Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ env.SERVICE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.IMAGE }}:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Backend | Offline LLM (Ollama + gemma2:2b) |" >> $GITHUB_STEP_SUMMARY
          echo "| Vertex AI | **DISABLED** |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | Private (IAM-protected) |" >> $GITHUB_STEP_SUMMARY
