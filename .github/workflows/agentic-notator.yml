name: "Agentic Notator (Issues / Wiki / Discussions)"

on:
  push:
    branches: ["main"]
  schedule:
    # Runs daily at 06:00 UTC — autonomous agent sweep
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Agent mode: full | issues_only | wiki_only | discussions_only"
        required: false
        default: "full"

permissions:
  contents: write
  issues: write
  discussions: write
  pull-requests: write

jobs:
  agentic-notator:
    name: "Sovereign Agentic Notator"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: "Scan recent commits and open issues"
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess, urllib.request, urllib.parse, datetime

          TOKEN = os.environ["GH_TOKEN"]
          REPO  = os.environ["REPO"]
          API   = "https://api.github.com"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2026-11-28",
          }

          def gh(method, path, body=None):
              url = f"{API}{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers={**HEADERS,"Content-Type":"application/json"}, method=method)
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.load(r)

          # 1. Get recent commits (last 10)
          commits = gh("GET", f"/repos/{REPO}/commits?per_page=10")
          commit_msgs = [c["commit"]["message"].split("\n")[0] for c in commits]
          print(f"[SCAN] Last {len(commit_msgs)} commits scanned.")

          # 2. Get open issues
          issues = gh("GET", f"/repos/{REPO}/issues?state=open&per_page=20")
          open_issues = [{"number": i["number"], "title": i["title"]} for i in issues if "pull_request" not in i]
          print(f"[SCAN] {len(open_issues)} open issues found.")

          # 3. Create a daily digest issue
          today = datetime.date.today().isoformat()
          commit_list = "\n".join(f"- {m}" for m in commit_msgs[:5])
          issue_list  = "\n".join(f"- #{i['number']}: {i['title']}" for i in open_issues[:5])

          body = f"""## Sovereign Agentic Daily Digest — {today}

          ### Recent Commits
          {commit_list}

          ### Open Issues ({len(open_issues)} total)
          {issue_list}

          ### System Status
          - Sovereign State Engine: **v1.0**
          - LM Studio Integration: configured (local MCP)
          - Zero Trust Layer: active
          - Pipeline: IVM → AI Agent → PDF Generator → Export/Recovery

          ---
          *Auto-generated by Sovereign Agentic Notator workflow*
          """

          new_issue = gh("POST", f"/repos/{REPO}/issues", {
              "title": f"[Agent Digest] Daily Sovereign Status — {today}",
              "body": body,
              "labels": ["agent-digest", "automated"],
          })
          print(f"[NOTATOR] Created issue #{new_issue['number']}: {new_issue['title']}")
          print(f"[NOTATOR] URL: {new_issue['html_url']}")
          PYEOF

      - name: "Update Wiki — Architecture Overview"
        if: github.event_name == 'push' || github.event.inputs.mode == 'full' || github.event.inputs.mode == 'wiki_only'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, subprocess, urllib.request, base64, datetime

          TOKEN = os.environ["GH_TOKEN"]
          REPO  = os.environ["REPO"]
          API   = "https://api.github.com"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2026-11-28",
              "Content-Type": "application/json",
          }

          def gh(method, path, body=None):
              url = f"{API}{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=HEADERS, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.load(r)
              except urllib.error.HTTPError as e:
                  return {"error": str(e)}

          today = datetime.date.today().isoformat()
          wiki_content = f"""# Sovereign State Engine — Architecture Overview

          **Last updated by Agentic Notator:** {today}

          ## System Modules

          | Module | File | Role |
          |--------|------|------|
          | Core Storage | `sovereign/core_storage.py` | Zero-retention local cache / Keychain abstraction |
          | IVM Agent | `sovereign/ivm_agent.py` | Identity Verification — SHA256-only data acquisition |
          | AI Agent | `sovereign/ai_agent.py` | Intelligence — routes to local LM Studio MCP |
          | PDF Generator | `sovereign/pdf_agent.py` | Immutable audit document generation |
          | Export/Recovery | `sovereign/export_recovery_agent.py` | Digital Sovereignty Manifest + mnemonic |
          | POA Orchestrator | `sovereign/poa_orchestrator.py` | Master execution pipeline |
          | LM Studio Client | `sovereign/lm_studio_client.py` | Local LLM inference layer |

          ## Execution Pipeline
          ```
          ZTNA Gate → Capacity Check (50 users max) → SHA256 Hash
              → IVM Agent → AI Agent (LM Studio) → PDF Generator → Export/Recovery
          ```

          ## Cost Model
          - Heavy AI reasoning: **local LM Studio** (zero cloud cost)
          - Cloud budget: Firebase Hosting + minimal GCP services only
          - Target: **< $12-16/month** total platform cost

          ## Security Properties
          - Zero-trust: every module validates independently
          - SHA256-only identity: no raw PII ever leaves IVM
          - Zero-retention: sensitive buffers wiped after pipeline
          - Privacy by design: temp profiles link only to hash

          ## GitHub Workflows
          - `deploy.yml` — Firebase deployment
          - `compliance-agent.yml` — Autonomous compliance sweep
          - `security-scan.yml` — CodeQL + SAST
          - `agentic-notator.yml` — **This workflow** — daily digest + wiki updates
          """

          # Write to docs/architecture.md in the repo (wiki API requires separate git repo)
          existing = gh("GET", f"/repos/{REPO}/contents/docs/architecture.md")
          sha = existing.get("sha") if isinstance(existing, dict) and "sha" in existing else None

          payload = {
              "message": f"docs(agent): update architecture overview [{today}]",
              "content": base64.b64encode(wiki_content.encode()).decode(),
          }
          if sha:
              payload["sha"] = sha

          result = gh("PUT", f"/repos/{REPO}/contents/docs/architecture.md", payload)
          if "content" in result:
              print(f"[WIKI] docs/architecture.md updated successfully.")
          else:
              print(f"[WIKI] Result: {result}")
          PYEOF
