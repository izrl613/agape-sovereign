# =============================================================
# AGAPE SOVEREIGN — AGENTIC NOTATOR
# Runs every 6 hours and on push to main.
# Reads repo state, upserts wiki + discussion/issue log,
# and labels unlabelled open issues with needs-triage.
# Uses only GITHUB_TOKEN — zero external secrets required.
# =============================================================
name: Agentic Notator

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write        # wiki page upsert via git
  issues: write          # create/update issues + labels
  pull-requests: read    # read open PRs
  discussions: write     # create discussion post

jobs:
  notate:
    name: Notate Repo Status
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------
      # 1. Checkout repo
      # ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------------
      # 2. Gather repo state (open issues, open PRs, latest commit)
      # ----------------------------------------------------------
      - name: Gather repo state
        id: state
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Open issues (excluding PRs)
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', per_page: 100 }
            );
            const openIssues = issues.filter(i => !i.pull_request);

            // Open PRs
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );

            // Latest commit on default branch
            const commits = await github.rest.repos.listCommits({
              owner, repo, per_page: 1
            });
            const latestSha  = commits.data[0]?.sha ?? 'n/a';
            const latestShort = latestSha.slice(0, 7);
            const latestMsg  = commits.data[0]?.commit?.message?.split('\n')[0] ?? '';

            const now = new Date().toISOString().replace('T',' ').slice(0,19) + ' UTC';

            core.setOutput('open_issues',  String(openIssues.length));
            core.setOutput('open_prs',     String(prs.length));
            core.setOutput('latest_sha',   latestShort);
            core.setOutput('latest_msg',   latestMsg);
            core.setOutput('timestamp',    now);
            core.setOutput('full_sha',     latestSha);

            // Also store full issue list as JSON for later steps
            core.setOutput('issues_json',  JSON.stringify(
              openIssues.map(i => ({ number: i.number, labels: i.labels.map(l => l.name) }))
            ));

      # ----------------------------------------------------------
      # 3. Upsert GitHub Wiki page: Agent-Status-Log
      # ----------------------------------------------------------
      - name: Upsert wiki Agent-Status-Log
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIMESTAMP:    ${{ steps.state.outputs.timestamp }}
          OPEN_ISSUES:  ${{ steps.state.outputs.open_issues }}
          OPEN_PRS:     ${{ steps.state.outputs.open_prs }}
          LATEST_SHA:   ${{ steps.state.outputs.latest_sha }}
          LATEST_MSG:   ${{ steps.state.outputs.latest_msg }}
          REPO:         ${{ github.repository }}
        run: |
          set -e
          WIKI_REPO="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          # Clone the wiki (initialise it first if it doesn't exist yet)
          if git clone "$WIKI_REPO" wiki 2>/dev/null; then
            cd wiki
          else
            # Wiki not initialised — seed it
            mkdir wiki && cd wiki
            git init
            git remote add origin "$WIKI_REPO"
            echo "# Agent Status Log" > Agent-Status-Log.md
            git add . && git commit -m "init wiki"
            git push -u origin master 2>/dev/null || git push -u origin main 2>/dev/null || true
            cd ..
            git clone "$WIKI_REPO" wiki_retry && mv wiki_retry/* wiki/ && cd wiki
          fi

          PAGE="Agent-Status-Log.md"

          # Build new row
          STATUS="OK"
          NEW_ROW="| ${TIMESTAMP} | ${OPEN_ISSUES} | ${OPEN_PRS} | \`${LATEST_SHA}\` | ${STATUS} — ${LATEST_MSG} |"

          # Create page with header if missing
          if [ ! -f "$PAGE" ]; then
            cat > "$PAGE" << 'TABLE_HEADER'
          # Agent Status Log

          Automatically maintained by the [Agentic Notator](.github/workflows/agentic-notator.yml) workflow.

          | Date/Time (UTC) | Open Issues | Open PRs | Latest Commit | Status |
          |---|---|---|---|---|
          TABLE_HEADER
          fi

          # Append new row
          echo "$NEW_ROW" >> "$PAGE"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$PAGE"
          git commit -m "chore: agent status log ${TIMESTAMP}" || echo "Nothing to commit"
          git push || echo "Wiki push skipped"

      # ----------------------------------------------------------
      # 4. Create/update pinned issue OR post to Discussions
      # ----------------------------------------------------------
      - name: Upsert status issue or discussion
        uses: actions/github-script@v7
        env:
          TIMESTAMP:   ${{ steps.state.outputs.timestamp }}
          OPEN_ISSUES: ${{ steps.state.outputs.open_issues }}
          OPEN_PRS:    ${{ steps.state.outputs.open_prs }}
          LATEST_SHA:  ${{ steps.state.outputs.latest_sha }}
          LATEST_MSG:  ${{ steps.state.outputs.latest_msg }}
          FULL_SHA:    ${{ steps.state.outputs.full_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const ts         = process.env.TIMESTAMP;
            const openIssues = process.env.OPEN_ISSUES;
            const openPRs    = process.env.OPEN_PRS;
            const sha        = process.env.LATEST_SHA;
            const msg        = process.env.LATEST_MSG;
            const fullSha    = process.env.FULL_SHA;

            const body = [
              '## Autonomous Status Update',
              '',
              `> Auto-generated by \`agentic-notator\` — last run: **${ts}**`,
              '',
              '| Field | Value |',
              '|---|---|',
              `| Date/Time (UTC) | \`${ts}\` |`,
              `| Open Issues | ${openIssues} |`,
              `| Open PRs | ${openPRs} |`,
              `| Latest Commit SHA | [\`${sha}\`](https://github.com/${owner}/${repo}/commit/${fullSha}) |`,
              `| Latest Commit Msg | ${msg} |`,
              `| Status | OK |`,
              '',
              '---',
              '_This issue is maintained automatically. Do not close — it will be recreated._',
            ].join('\n');

            const title = '[AGENT LOG] Autonomous Status Update';

            // Try Discussions first (GraphQL)
            let usedDiscussion = false;
            try {
              // Get repo node_id and first Announcements-style category
              const repoData = await github.graphql(`
                query($owner: String!, $repo: String!) {
                  repository(owner: $owner, name: $repo) {
                    id
                    discussionCategories(first: 10) {
                      nodes { id name }
                    }
                  }
                }`, { owner, repo });

              const cats = repoData.repository.discussionCategories.nodes;
              const cat  = cats.find(c =>
                /general|announce|status|agent/i.test(c.name)
              ) || cats[0];

              if (cat) {
                await github.graphql(`
                  mutation($repoId: ID!, $catId: ID!, $title: String!, $body: String!) {
                    createDiscussion(input: {
                      repositoryId: $repoId,
                      categoryId:   $catId,
                      title:        $title,
                      body:          $body
                    }) { discussion { url } }
                  }`, {
                    repoId: repoData.repository.id,
                    catId:  cat.id,
                    title,
                    body
                  });
                core.info(`Discussion created in category: ${cat.name}`);
                usedDiscussion = true;
              }
            } catch (e) {
              core.warning(`Discussions unavailable or failed: ${e.message}. Falling back to issue.`);
            }

            if (!usedDiscussion) {
              // Find existing [AGENT LOG] issue
              const existing = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', per_page: 100
              });
              const logIssue = existing.data.find(
                i => i.title === title && !i.pull_request
              );

              if (logIssue) {
                await github.rest.issues.update({
                  owner, repo, issue_number: logIssue.number,
                  body
                });
                core.info(`Updated existing log issue #${logIssue.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner, repo, title, body,
                  labels: ['agent-log']
                });
                core.info(`Created log issue #${created.data.number}`);
              }
            }

      # ----------------------------------------------------------
      # 5. Label all unlabelled open issues with needs-triage
      # ----------------------------------------------------------
      - name: Label unlabelled issues with needs-triage
        uses: actions/github-script@v7
        env:
          ISSUES_JSON: ${{ steps.state.outputs.issues_json }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const label = 'needs-triage';

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: label,
                color: 'e4e669',
                description: 'Awaiting triage by maintainer'
              });
              core.info(`Created label: ${label}`);
            }

            const issues = JSON.parse(process.env.ISSUES_JSON || '[]');
            const unlabelled = issues.filter(i => i.labels.length === 0);
            core.info(`Found ${unlabelled.length} unlabelled open issue(s).`);

            for (const issue of unlabelled) {
              await github.rest.issues.addLabels({
                owner, repo,
                issue_number: issue.number,
                labels: [label]
              });
              core.info(`Labelled issue #${issue.number} with ${label}`);
            }
