name: Firebase Deploy (Manual Only)

on:
  workflow_dispatch:

jobs:
  manual-only-guardrail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Explain zero-cost policy
        run: |
          echo "Automatic deployment is disabled for this repository."
          echo "Under the compliance roadmap, Firebase deployment must remain a deliberate maintainer action."
          echo "No non-Firebase GCP services may be created, configured, or deployed automatically."

      - name: Validate Firebase artifacts exist
        run: |
          test -f firebase.json
          test -f firestore.rules
          test -f storage.rules
