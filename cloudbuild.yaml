steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agape-sovereign-server:$SHORT_SHA'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agape-sovereign-server:latest'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agape-sovereign-server:$SHORT_SHA'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agape-sovereign-server:latest'

- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'agape-sovereign-server'
    - '--image'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/agape-sovereign-server:$SHORT_SHA'
    - '--region'
    - 'us-central1'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'
    - '--min-instances'
    - '0'
    - '--max-instances'
    - '10'
    - '--memory'
    - '512Mi'
    - '--cpu'
    - '1'
    - '--concurrency'
    - '80'
    - '--timeout'
    - '300'
    - '--set-env-vars'
    - 'NODE_ENV=production'
    - '--ingress'
    - 'all'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1800s