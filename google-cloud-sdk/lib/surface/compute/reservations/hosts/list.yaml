release_tracks: [ALPHA, BETA]
help_text:
  brief: List Google Compute Engine hosts for a reservation.
  description: List Google Compute Engine hosts in a given project and zone, filtered by reservation.
request:
  ALPHA:
    api_version: alpha
  BETA:
    api_version: beta
  collection: compute.hosts
  method: list
  modify_request_hooks:
  - googlecloudsdk.command_lib.compute.hosts.util:CreateAssociationHook
arguments:
  resource:
    help_text: The zone to list hosts for.
    spec: !REF googlecloudsdk.command_lib.compute.resources:zone
    is_positional: false
  params:
  - arg_name: reservation
    required: false
    help_text: |
      Name of the reservation the hosts are associated with.
  - arg_name: reservation-block
    required: false
    help_text: |
      Name of the reservation block the hosts are associated with.

response:
  id_field: name
