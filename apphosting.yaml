# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets.
env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: PORT
    value: "8080"
    availability:
      - RUNTIME
  - variable: OLLAMA_BASE_URL
    value: http://localhost:11434
    availability:
      - RUNTIME
  - variable: ARCHITECT_MODEL
    value: gemma4:e4b
    availability:
      - RUNTIME